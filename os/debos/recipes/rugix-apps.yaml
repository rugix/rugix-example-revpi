---
{{ $arch := .arch -}}

architecture: {{ $arch }}

actions:
  - action: overlay
    description: Install Rugix Apps runtime files
    source: ../overlays/rugix-apps

  - action: run
    description: Enable Rugix Apps runtime units
    chroot: true
    command: >
      systemctl enable
      rugix-docker-runtime-components.service
      rugix-rpi-components.service
      rugix-revpi-components.service
      rugix-apps-restore-units.service
      rugix-apps-recover.service
