---
{{ $arch := .arch -}}
{{- $output := .output -}}

architecture: {{ $arch }}

actions:
  {{/* Create a rugix bundle for updating systems */}}
  - action: run
    description: Create rugix bundle
    postprocess: true
    script: create-rugix-bundle.sh
      "$ARTIFACTDIR"
      "{{ $output }}"
      boot-a
      system-a
