services:
  influxdb:
    image: docker.io/library/influxdb:2.7
    restart: unless-stopped
    ports:
      - "${REVPI_INFLUX_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUX_USERNAME:-revpi}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUX_PASSWORD:-revpi-influx-password}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUX_ORG:-revpi}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUX_BUCKET:-revpi_dio}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUX_TOKEN:-revpi-dio-token}"
    volumes:
      - ${RUGIX_APP_DATA_DIR:-./.runtime/data}/influxdb:/var/lib/influxdb2
      - ${RUGIX_APP_DATA_DIR:-./.runtime/data}/influxdb-config:/etc/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 5s
      timeout: 4s
      retries: 24

  dio-controller:
    image: localhost/rugix-example-revpi/revpi-dio-controller:0.1.0
    build: ./services/dio-controller
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    devices:
      - /dev/piControl0:/dev/piControl0
    ports:
      - "${REVPI_DIO_WEB_PORT:-8090}:8090"
    environment:
      APP_SCHEMA_VERSION: "2"
      DATA_DIR: /data
      DIO_INPUT_NAMES: "${DIO_INPUT_NAMES:-I_1,I_2,I_3,I_4}"
      DIO_COUNTER_NAMES: "${DIO_COUNTER_NAMES:-Counter_1,Counter_2,Counter_3,Counter_4}"
      DIO_OUTPUT_NAMES: "${DIO_OUTPUT_NAMES-O_1,O_2,O_3,O_4}"
      HEALTH_CHECK_WEB: "${HEALTH_CHECK_WEB:-true}"
      INFLUX_BUCKET: "${INFLUX_BUCKET:-revpi_dio}"
      INFLUX_ORG: "${INFLUX_ORG:-revpi}"
      INFLUX_TOKEN: "${INFLUX_TOKEN:-revpi-dio-token}"
      INFLUX_URL: http://influxdb:8086
      LEGACY_DATA_DIR: /legacy-data
      POLL_INTERVAL_SECONDS: "${POLL_INTERVAL_SECONDS:-0.5}"
      RESET_COUNTERS_ON_START: "${RESET_COUNTERS_ON_START:-false}"
      REVPI_CONFIG_RSC: /etc/revpi/config.rsc
      SIMULATE_INPUTS: "${SIMULATE_INPUTS:-false}"
      WEB_BIND: 0.0.0.0
      WEB_PORT: "8090"
    volumes:
      - type: bind
        source: ${REVPI_CONFIG_RSC_HOST:-/etc/revpi/config.rsc}
        target: /etc/revpi/config.rsc
        read_only: true
        bind:
          create_host_path: false
      - ${RUGIX_APP_DATA_DIR:-./.runtime/data}/dio-controller:/data
      - ${RUGIX_APP_DATA_DIR:-./.runtime/data}/logger:/legacy-data:ro
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 5s
      timeout: 4s
      retries: 24

  grafana:
    image: docker.io/grafana/grafana-oss:11.5.2
    user: "0:0"
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    ports:
      - "${REVPI_GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-revpi}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_BUCKET: "${INFLUX_BUCKET:-revpi_dio}"
      INFLUXDB_ORG: "${INFLUX_ORG:-revpi}"
      INFLUXDB_TOKEN: "${INFLUX_TOKEN:-revpi-dio-token}"
      INFLUXDB_URL: http://influxdb:8086
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/etc/grafana/dashboards:ro
      - ${RUGIX_APP_DATA_DIR:-./.runtime/data}/grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
